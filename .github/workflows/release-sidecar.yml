name: Release Sidecar

on:
  push:
    branches:
      - main
    paths:
      - 'sidecar/**'
      - 'sdk/**'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read and validate VERSION
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < sidecar/VERSION)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::sidecar/VERSION '$VERSION' is not valid semver"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag uniqueness
        run: |
          if git ls-remote --tags origin "refs/tags/sidecar-v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "::error::Tag sidecar-v${{ steps.version.outputs.version }} already exists."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: meta
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAGS="ghcr.io/${{ github.repository_owner }}/opengpl/sidecar:$VERSION,ghcr.io/${{ github.repository_owner }}/opengpl/sidecar:latest"
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            TAGS="$TAGS,opengpl/sidecar:$VERSION,opengpl/sidecar:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: sidecar/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sidecar-v${{ steps.version.outputs.version }}
          name: "opengpl/sidecar v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          body: |
            Docker images published:
            - `docker pull opengpl/sidecar:${{ steps.version.outputs.version }}`
            - `docker pull opengpl/sidecar:latest`
            - `docker pull ghcr.io/${{ github.repository_owner }}/opengpl/sidecar:${{ steps.version.outputs.version }}`
            - `docker pull ghcr.io/${{ github.repository_owner }}/opengpl/sidecar:latest`
